name: spiritual_insights
description: "Awaken Your Inner Peace - A spiritual wellness app with gamification and personalization."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.7
  firebase_storage: ^12.4.4

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  fl_chart: ^0.70.2
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

  # Audio/Media
  just_audio: ^0.9.43
  audio_session: ^0.1.25
  youtube_player_flutter: ^9.1.1

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Image
  image_picker: ^1.1.2

  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  path_provider: ^2.1.5

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/icons/
